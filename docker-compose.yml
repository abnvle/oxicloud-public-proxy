# Copy `.env.example` to `.env` and edit before `docker compose up`.

services:
  oxicloud-public-proxy:
    build: .
    image: oxicloud/public-proxy:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    # Uncomment if running on the same Docker network as OxiCloud:
    # networks:
    #   - oxicloud
    # external: true

# networks:
#   oxicloud:
#     external: true
